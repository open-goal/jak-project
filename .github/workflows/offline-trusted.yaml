name: 🧪 Offline Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  issue_comment:
    types: [created]

concurrency:
  group: offline-tests
  cancel-in-progress: false

jobs:
  validate-author:
    name: Verify Permissions
    runs-on: self-hosted
    timeout-minutes: 5
    outputs:
      trusted: ${{ steps.verify.outputs.trusted }}
      sha: ${{ steps.verify.outputs.sha }}
    steps:
      - id: verify
        name: Verify Permissions
        if: github.repository == 'open-goal/jak-project'
        env:
          EVENT: ${{ github.event_name }}
          AUTHOR_ID: ${{ github.event.pull_request.user.id }}
          COMMENT_ID: ${{ github.event.comment.user.id }}
          COMMENT: ${{ github.event.comment.body }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -e

          mkdir -p ./tmp-ci

          curl -fsSL \
            https://raw.githubusercontent.com/open-goal/jak-project/master/.github/offline-allowlist.txt \
            -o ./tmp-ci/whitelist.txt

          is_trusted=false

          # ---- PUSH: always trusted ----
          if [ "$EVENT" = "push" ]; then
            is_trusted=true
            SHA="${{ github.sha }}"

          # ---- PULL REQUEST: check author ----
          elif [ "$EVENT" = "pull_request" ]; then
            SHA="${{ github.event.pull_request.head.sha }}"
            if grep -Fxq "$AUTHOR_ID" ./tmp-ci/whitelist.txt; then
              is_trusted=true
            fi

          # ---- ISSUE COMMENT: "ok to test" gate ----
          elif [ "$EVENT" = "issue_comment" ]; then
            SHA=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER --jq '.head.sha')
            if [ "$COMMENT" = "ok to test" ] && grep -Fxq "$COMMENT_ID" ./tmp-ci/whitelist.txt; then
              is_trusted=true
            fi
          fi

          echo "trusted=$is_trusted" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

          rm -rf ./tmp-ci
  offline-tests:
    name: Run Tests
    needs: validate-author
    if: needs.validate-author.outputs.trusted == 'true'
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /ci/workspace/jak
    timeout-minutes: 60
    # TODO - run the tests
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ needs.validate-author.outputs.sha }}
          path: _work/jak-workspace
          clean: false

      - name: Temporary
        run: echo "test"